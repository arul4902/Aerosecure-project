# AeroSecure Backend - Application Properties (Development)

# Application
spring.application.name=AeroSecure
server.port=8080

# H2 Database (Development)
spring.datasource.url=jdbc:h2:mem:aerosecure
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=AeroSecureJWTSecret2024SuperSecretKeyThatIsLongEnoughForHS512Algorithm!!
jwt.expiration=86400000

# CORS
cors.allowed-origins=http://localhost:4200

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.com.aerosecure=INFO
logging.level.org.springframework.security=WARN
